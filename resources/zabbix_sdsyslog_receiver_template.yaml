zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: e17f5c0cb9924ef0bb06762d1a22b33a
      template: 'SDSyslog Receiver'
      name: 'SDSyslog Receiver'
      description: |
        Metric collection and alerting template for SDSyslog Receiver daemon.
        Requires zabbix server be running on the same server as the receiver daemon (Metric server is listening on localhost)
      groups:
        - name: Templates/Applications
      items:
        - uuid: 792f9f768d924fa99499d5c4e13612b8
          name: 'SDSyslog - Bulk Defrag Metrics'
          type: HTTP_AGENT
          key: 'sdsyslog.recv.metrics.bulk[defrag]'
          history: 4h
          value_type: TEXT
          description: 'Raw worker metrics for all defragmentation instances'
          url: 'http://localhost:28514/bulk/'
          follow_redirects: 'NO'
          post_type: JSON
          posts: |
            {
              "filters":[
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "processed_buckets",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "max",
                  "name": "packet_deadline",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "elapsed_time_sum_ns",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "max",
                  "name": "elapsed_time_max_ns",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "max",
                  "name": "instance_count",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "total_bytes",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "total_buckets",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "waiting_buckets",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "timed_out_buckets",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "sum_time_between_fragments",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "push_ctn",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                },
                {
                  "type": "aggregation",
                  "aggregationType": "sum",
                  "name": "pop_ctn",
                  "namespace": "Receiver/Defrag",
                  "startTime": "-1m",
                  "endTime": "now"
                }
              ]
            }
          request_method: POST
          output_format: JSON
          tags:
            - tag: namespace
              value: Receiver/Defrag
