          master_item:
            key: 'sdsyslog.recv.metrics.raw[ingest/listener/valid_packets_total]'
          tags:
            - tag: namespace
              value: Receiver/Ingest/Listener
        - uuid: 1158ea1788ea487d88c3266756f1c883
          name: 'SDSyslog - Defrag-to-Output Queue Filled Percentage'
          type: CALCULATED
          key: 'sdsyslog.recv.metrics.derived[out/queue/fill_pct]'
          history: 365d
          value_type: FLOAT
          trends: 900d
          units: '%'
          params: 'last(//sdsyslog.recv.metrics.raw[out/queue/depth])/last(//sdsyslog.recv.metrics.raw[out/queue/capacity])*100'
          description: 'Queue Usage Percentage'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
