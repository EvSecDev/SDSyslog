              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          tags:
            - tag: namespace
              value: Receiver/Defrag
          triggers:
            - uuid: 02e5f9331c89475d83b52d35b71c5736
              expression: 'last(/SDSyslog Receiver/sdsyslog.recv.metrics.derived[out/queue/fill_pct])>=70'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/SDSyslog Receiver/sdsyslog.recv.metrics.derived[out/queue/fill_pct])<=10'
              name: 'Output Queue Usage Too High'
              opdata: 'Current Usage Percent: {ITEM.LASTVALUE1}'
              priority: AVERAGE
              description: 'Output queue usage percentage has risen to very high levels'
              tags:
                - tag: namespace
                  value: Receiver/Out/Queue
        - uuid: c1c79565175a45f7aca75df895cf8e94
          name: 'SDSyslog - Defrag-to-Output Queue Pop Success Ratio'
          type: CALCULATED
          key: 'sdsyslog.recv.metrics.derived[out/queue/pop_success_ratio]'
