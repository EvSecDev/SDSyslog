        - uuid: 90672b41bd1148f0a3ab1ec92ec26ae5
          name: 'SDSyslog - Defrag Busy Time Percentage'
          type: CALCULATED
          key: 'sdsyslog.recv.metrics.derived[defrag/busy_time_percent]'
          history: 365d
          value_type: FLOAT
          trends: 900d
          units: '%'
          params: '(last(//sdsyslog.recv.metrics.raw[defrag/elapsed_time_sum_ns])/60)*100'
          description: 'Percentage of time spent doing anything in the interval'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          tags:
            - tag: namespace
              value: Receiver/Defrag
        - uuid: 7c1c38357f03464197a36dfb1ceb75f9
          name: 'SDSyslog - Defrag Incomplete Message Rate'
          type: CALCULATED
          key: 'sdsyslog.recv.metrics.derived[defrag/incomplete_message_pct]'
          history: 365d
          value_type: FLOAT
          trends: 900d
          units: '%'
          params: 'last(//sdsyslog.recv.metrics.raw[defrag/queue/timed_out_buckets])/last(//sdsyslog.recv.metrics.raw[defrag/queue/total_buckets])*100'
          description: 'Percentage of messages that failed reconstruction (missing fragments)'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          tags:
            - tag: namespace
              value: Receiver/Out
          triggers:
            - uuid: edf482a30ede4cafb030579e50aefdee
              expression: 'last(/SDSyslog Receiver/sdsyslog.recv.metrics.derived[defrag/incomplete_message_pct])>=1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/SDSyslog Receiver/sdsyslog.recv.metrics.derived[defrag/incomplete_message_pct])=0'
              name: 'Defrag Incomplete Message Rate Too High'
              opdata: 'Current Incomplete Rate: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Defrag incomplete message count has risen above 1% of total messages'
              tags:
                - tag: namespace
                  value: Receiver/Defrag
        - uuid: 8d5197bac04f480fae9131d242b30a46
          name: 'SDSyslog - Defrag Assembled Messages Per Second Change'
          type: DEPENDENT
          key: 'sdsyslog.recv.metrics.derived[defrag/processed_buckets_change]'
          value_type: FLOAT
          preprocessing:
            - type: CHANGE_PER_SECOND
          master_item:
            key: 'sdsyslog.recv.metrics.raw[defrag/processed_buckets]'
          tags:
            - tag: namespace
              value: Receiver/Defrag
        - uuid: 1a16b6f7da0e4cb391fe0bfd6e72c78f
          name: 'SDSyslog - Listener Invalid Packet Rate'
          type: CALCULATED
          key: 'sdsyslog.recv.metrics.derived[ingest/listener/invalid_packet_pct]'
          history: 365d
          value_type: FLOAT
          trends: 900d
          units: '%'
          params: 'last(//sdsyslog.recv.metrics.raw[ingest/listener/invalid_packets_total])/(last(//sdsyslog.recv.metrics.raw[ingest/listener/valid_packets_total])+last(//sdsyslog.recv.metrics.raw[ingest/listener/invalid_packets_total]))*100'
          description: 'Percentage of total received packets that were invalid'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          tags:
            - tag: namespace
              value: Receiver/Ingest/Listener
          triggers:
            - uuid: fafb1ca575ec4d60a989ec9580c87dda
              expression: 'last(/SDSyslog Receiver/sdsyslog.recv.metrics.derived[ingest/listener/invalid_packet_pct])>=1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/SDSyslog Receiver/sdsyslog.recv.metrics.derived[ingest/listener/invalid_packet_pct])=0'
              name: 'Listener Invalid Packet Rate Too High'
              opdata: 'Current Invalid Rate: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Listener invalid packet count has risen above 1% of total received packets'
              tags:
                - tag: namespace
                  value: Receiver/Ingest/Listener
        - uuid: cee69714f1db4ff7bef4940ecfdbb0ae
          name: 'SDSyslog - Listener Valid Packets Per Second Change'
          type: DEPENDENT
          key: 'sdsyslog.recv.metrics.derived[ingest/listener/valid_packets_change]'
          value_type: FLOAT
          description: 'Numeric change in incoming packets per second'
          preprocessing:
